<ng-container *ngIf="!item.hidden">
    <!-- collapsible title -->
    <a class="d-flex align-items-center" [ngClass]="item.classes" *ngIf="!item.url" (click)="toggleOpen($event)">
        <ng-container *ngTemplateOutlet="itemContent"></ng-container>
    </a>

    <!-- itemContent template -->
    <ng-template #itemContent>
        <!-- <span [data-feather]="item.icon" *ngIf="item.icon"></span> -->
        <span [data-feather]="item.icon" *ngIf="item.icon && !item.newIcon"></span>
        <li class="mr-1" *ngIf="item.newIcon">
            <img class="ico-r30"
                 id="{{item.id}}"
                 height="{{item.heightIcon || 20}}"
                 src="assets/images/icons/system/menu/{{item.newIcon}}.svg"
                 *ngIf="item.newIcon">
        </li>
        <span class="menu-title text-truncate" [translate]="item.translate">{{ item.title }}</span>
        <span class="badge ml-auto mr-1"
              *ngIf="item.badge"
              [translate]="item.badge.translate"
              [ngClass]="item.badge.classes">
            {{ item.badge.title }}
        </span>
    </ng-template>

    <!-- sub-menu item/collapsible -->
    <ul class="menu-content">
        <ng-container *ngFor="let item of item.children">
            <!-- item -->
            <li core-menu-vertical-item
                [item]="item"
                *ngIf="item.type == 'item'"
                [ngClass]="{ disabled: item.disabled === true }"
                [routerLinkActive]="!item.openInNewTab ? 'active' : ''"
                [routerLinkActiveOptions]="{ exact: item.exactMatch || false }">
                <span [routerLink]="item.openInNewTab ? [] : [item.url]" class="d-none"></span>
            </li>
            <!-- collapsible -->
            <li core-menu-vertical-collapsible *ngIf="item.type == 'collapsible'" [item]="item"
                class="nav-item has-sub">
            </li>
        </ng-container>
    </ul>
</ng-container>
