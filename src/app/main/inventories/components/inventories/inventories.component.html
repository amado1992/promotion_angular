<div class="content-wrapper">
    <div class="content-body">
        <div class="col-12 row mb-2 d-flex justify-content-between align-items-center">
            <div class="col-9 p-0 d-flex align-items-center">
                <ul ngbNav #navFilled="ngbNav" class="m-0 col-6 nav-tabs">
                    <li [ngbNavItem]="1">
                        <a ngbNavLink>Inventarios</a>
                        <ng-template ngbNavContent>
                            <app-inventories-index [navFilled]="navFilled">
                            </app-inventories-index>
                        </ng-template>
                    </li>
                    <li [ngbNavItem]="2" [disabled]="_disabled">
                        <a ngbNavLink>Movimientos del inventario</a>
                        <ng-template ngbNavContent>
                            <app-inventories-details></app-inventories-details>
                        </ng-template>
                    </li>
                </ul>
            </div>
        </div>
        <div [ngbNavOutlet]="navFilled" class="mt-2"></div>
    </div>
</div>
