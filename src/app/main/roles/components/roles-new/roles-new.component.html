<form [formGroup]="_addNewRoleForm" (ngSubmit)="onCreate()">
    <div class="modal-header bg-primary">
        <img class="icon_role" src="assets/images/icons/system/menu/icon_role.svg">
        <h2 class="modal-title text-white" id="new-role-modal">Nuevo Rol</h2>
        <button type="button" class="close" (click)="onClose()" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    <div class="modal-body" tabindex="0" ngbAutofocus>
        <div class="row">
            <div class="col-12 col-md-6 form-group">
                <label for="role_name">Nombre</label>
                <input type="text"
                       class="form-control"
                       id="role_name"
                       [ngClass]="{ 'is-invalid error': _submitted && controls.role_name.errors }"
                       formControlName="role_name"
                       placeholder="Nombre"/>
                <div *ngIf="_submitted && controls.role_name.errors" class="invalid-feedback">
                    <div *ngIf="controls.role_name.errors.required"> Nombre es requerido</div>
                </div>
            </div>
            <div class="col-12">
                <div class="table-responsive border rounded mt-1"
                     formArrayName="role_permissions"
                     [ngClass]="{ 'is-invalid error': _submitted && controls.role_permissions.errors }">
                    <h6 class="py-1 mx-1 mb-0 font-medium-2 text-primary">
                        <i data-feather="lock" class="mr-25"></i>
                        <span class="align-middle">Permisos</span>
                    </h6>
                    <table class="table table-striped table-borderless">
                        <thead class="thead-light">
                        <tr>
                            <th>Módulos</th>
                            <th>Leer
                                <button *ngIf="_flag_read === false"
                                        type="button"
                                        (click)="onCheckedAll('read', !_flag_read)"
                                        class="btn btn-icon rounded-circle btn-flat-success"
                                        tooltipClass="fadeInAnimation"
                                        ngbTooltip="Marcar Todos"
                                        rippleEffect>
                                    <span [data-feather]="'check'"></span>
                                </button>
                                <button *ngIf="_flag_read === true"
                                        type="button"
                                        (click)="onCheckedAll('read', !_flag_read)"
                                        class="btn btn-icon rounded-circle btn-flat-danger"
                                        tooltipClass="fadeInAnimation"
                                        ngbTooltip="Desmarcar Todos"
                                        rippleEffect>
                                    <span [data-feather]="'x'"></span>
                                </button>
                            </th>
                            <th>Crear
                                <button *ngIf="_flag_create === false"
                                        type="button"
                                        (click)="onCheckedAll('create', !_flag_create)"
                                        class="btn btn-icon rounded-circle btn-flat-success"
                                        tooltipClass="fadeInAnimation"
                                        ngbTooltip="Marcar Todos"
                                        rippleEffect>
                                    <span [data-feather]="'check'"></span>
                                </button>
                                <button *ngIf="_flag_create === true"
                                        type="button"
                                        (click)="onCheckedAll('create', !_flag_create)"
                                        class="btn btn-icon rounded-circle btn-flat-danger"
                                        tooltipClass="fadeInAnimation"
                                        ngbTooltip="Desmarcar Todos"
                                        rippleEffect>
                                    <span [data-feather]="'x'"></span>
                                </button>
                            </th>
                            <th>Editar
                                <button *ngIf="_flag_update === false"
                                        type="button"
                                        (click)="onCheckedAll('update', !_flag_update)"
                                        class="btn btn-icon rounded-circle btn-flat-success"
                                        tooltipClass="fadeInAnimation"
                                        ngbTooltip="Marcar Todos"
                                        rippleEffect>
                                    <span [data-feather]="'check'"></span>
                                </button>
                                <button *ngIf="_flag_update === true"
                                        type="button"
                                        (click)="onCheckedAll('update', !_flag_update)"
                                        class="btn btn-icon rounded-circle btn-flat-danger"
                                        tooltipClass="fadeInAnimation"
                                        ngbTooltip="Desmarcar Todos"
                                        rippleEffect>
                                    <span [data-feather]="'x'"></span>
                                </button>
                            </th>
                            <th>Eliminar
                                <button *ngIf="_flag_destroy === false"
                                        type="button"
                                        (click)="onCheckedAll('destroy', !_flag_destroy)"
                                        class="btn btn-icon rounded-circle btn-flat-success"
                                        tooltipClass="fadeInAnimation"
                                        ngbTooltip="Marcar Todos"
                                        rippleEffect>
                                    <span [data-feather]="'check'"></span>
                                </button>
                                <button *ngIf="_flag_destroy === true"
                                        type="button"
                                        (click)="onCheckedAll('destroy', !_flag_destroy)"
                                        class="btn btn-icon rounded-circle btn-flat-danger"
                                        tooltipClass="fadeInAnimation"
                                        ngbTooltip="Desmarcar Todos"
                                        rippleEffect>
                                    <span [data-feather]="'x'"></span>
                                </button>
                            </th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr *ngFor="let module of _permissions; let i = index;">
                            <td>{{ module.module }}</td>
                            <td *ngFor="let permission of module.permissions; let y = index;">
                                <div class="custom-control custom-checkbox">
                                    <input type="checkbox"
                                           class="custom-control-input"
                                           id="{{permission}}"
                                           (change)="onCheckboxChange($event)"/>
                                    <label class="custom-control-label" for="{{permission}}"></label>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div *ngIf="_submitted && controls.role_permissions.errors" class="invalid-feedback pt-1">
                    <div *ngIf="controls.role_permissions.errors.required"> Permisos son requeridos</div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button type="submit" class="btn btn-success" rippleEffect> Guardar</button>
        <button type="button" class="btn btn-secondary" (click)="onClose()" rippleEffect> Cancelar</button>
    </div>
</form>
