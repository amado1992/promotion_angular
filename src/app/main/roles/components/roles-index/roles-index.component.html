<div class="content-wrapper">
    <div class="content-body">
        <!-- Role List Start -->
        <section class="users-list-wrapper">
            <!-- Role Filter Start -->
            <div class="card">
                <form [formGroup]="_filterForm" (ngSubmit)="onFilterAll()">
                    <h5 class="card-header">
                        <div class="d-flex align-items-center">Filtro de Búsqueda</div>
                        <div class="d-flex align-items-center heading-elements">
                            <a (click)="onCollapse()"
                               data-action="collapse"
                               tooltipClass="fadeInAnimation"
                               placement="top"
                               ngbTooltip="{{(_collapseStatus ? 'Mostrar' : 'Cerrar')}}"
                               [ngClass]="{ rotate: _collapseStatus }"
                               [attr.aria-expanded]="_collapseStatus">
                                <i class="feather icon-chevron-up d-sm-block d-none font-medium-2 mr-1"></i>
                            </a>
                            <a (click)="onFilterAll()"
                               tooltipClass="fadeInAnimation"
                               placement="top"
                               ngbTooltip="Filtrar">
                                <i data-feather="search"
                                   class="cursor-pointer d-sm-block d-none font-medium-2 mr-1"></i>
                            </a>
                            <a (click)="onClean()"
                               tooltipClass="fadeInAnimation"
                               placement="top"
                               ngbTooltip="Limpiar">
                                <i data-feather="droplet"
                                   class="cursor-pointer d-sm-block d-none font-medium-2"></i>
                            </a>
                        </div>
                    </h5>
                    <div class="card-body" [ngbCollapse]="_collapseStatus">
                        <div class="users-list-filter">
                            <div class="row">
                                <div class="col-12 col-md-3">
                                    <fieldset class="form-group">
                                        <input type="text"
                                               class="form-control"
                                               id="name"
                                               formControlName="name"
                                               placeholder="Nombre"/>
                                    </fieldset>
                                </div>
                            </div>
                            <button type="submit" class="hidden"></button>
                        </div>
                    </div>
                </form>
            </div>
            <!-- Role Filter End -->

            <div class="card">
                <div class="row">
                    <div class="col-md-6 col-12">
                        <div class="d-flex justify-content-between align-items-center m-1">
                            <label class="d-flex align-items-center">Mostrar
                                <select class="form-control mx-25"
                                        [(ngModel)]="_pageModel.limit"
                                        (ngModelChange)="onChangeLimit($event)">
                                    <option value="10">10</option>
                                    <option value="25">25</option>
                                    <option value="50">50</option>
                                    <option value="100">100</option>
                                </select>
                                entradas
                            </label>
                        </div>
                    </div>
                    <div class="col-md-6 col-12 d-flex justify-content-start justify-content-md-end">
                        <div class="d-flex align-items-center"
                             [ngClass]="this._permissions_values.create ? 'ml-1 ml-md-0' : 'pr-1 pb-1 pb-md-0'">
                            <form [formGroup]="_filterSearch">
                                <input type="text"
                                       class="form-control ml-25"
                                       formControlName="search"
                                       spellcheck="false"
                                       placeholder="Buscar"
                                       (keyup)="onSearchFilter()"/>
                            </form>
                        </div>
                        <div class="d-flex align-items-center justify-content-end pr-1 pb-1 pb-md-0"
                             *appPermission="_permissions.create">
                            <button type="button" class="btn btn-primary ml-1" rippleEffect
                                    (click)="onModalNewRoleOpen()">
                                <i data-feather="plus" class="d-sm-none d-inline-block mr-0 mr-sm-1"></i>
                                <span class="d-none d-sm-inline-block">Nuevo Rol</span>
                            </button>
                        </div>
                    </div>
                </div>
                <ngx-datatable
                        class="bootstrap core-bootstrap"
                        [rows]="rows"
                        [columnMode]="ColumnMode.force"
                        [headerHeight]="50"
                        [footerHeight]="50"
                        [rowHeight]="'auto'"
                        [scrollbarH]="true"
                        [externalPaging]="true"
                        [externalSorting]="true"
                        [loadingIndicator]="true"
                        [count]="_pageModel.count"
                        [offset]="_pageModel.offset"
                        [limit]="_pageModel.limit"
                        [sortType]="SortType.single"
                        (page)="onPageCallback($event)"
                        (sort)="onSortCallback($event)">
                    <ngx-datatable-column name="Nombre" prop="name" [width]="400"></ngx-datatable-column>
                    <ng-container *ngIf="this._permissions_values.update || this._permissions_values.destroy">
                        <ngx-datatable-column name="Acciones" [width]="40" [sortable]="false">
                            <ng-template ngx-datatable-cell-template let-row="row">
                                <a (click)="onModalUpdateRoleOpen($event, row)"
                                   class="text-primary"
                                   tooltipClass="fadeInAnimation"
                                   placement="left-bottom"
                                   ngbTooltip="Editar"
                                   *appPermission="_permissions.update">
                                    <span [data-feather]="'edit'" [size]="16" [class]="'mr-50'"></span>
                                </a>
                                <a (click)="onDestroy(row)"
                                   class="text-danger"
                                   tooltipClass="fadeInAnimation"
                                   placement="left-bottom"
                                   ngbTooltip="Eliminar"
                                   *appPermission="_permissions.destroy">
                                    <span [data-feather]="'trash-2'" [size]="16" [class]="'mr-50'"></span>
                                </a>
                            </ng-template>
                        </ngx-datatable-column>
                    </ng-container>
                </ngx-datatable>
            </div>
        </section>
        <!-- Role List End -->
    </div>
</div>
