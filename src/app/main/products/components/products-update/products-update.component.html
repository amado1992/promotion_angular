<form [formGroup]="_updateProductForm" (ngSubmit)="onUpdate()" xmlns="http://www.w3.org/1999/html">
    <div class="modal-header bg-primary">
        <img class="icon_product" src="assets/images/icons/system/menu/icon_product.svg">
        <h2 class="modal-title text-white" id="update-product-modal">Editar producto</h2>
        <button type="button" class="close" (click)="onClose()" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    <div class="modal-body" tabindex="0" ngbAutofocus>
        <div class="row">
            <div class="col-12 col-md-12 col-lg-6 col-xl-6 form-group">
                <label for="name">Nombre</label>
                <input type="text" class="form-control" id="name"
                    [ngClass]="{ 'is-invalid': _submitted && controls.name.errors }"
                    formControlName="name" placeholder="Nombre" />
                <div *ngIf="_submitted && controls.name.errors" class="invalid-feedback">
                    <div *ngIf="controls.name.errors.required"> Nombre es requerido</div>
                </div>
            </div>

             <div class="col-12 col-md-12 col-lg-6 col-xl-6 form-group">
                <label for="product_description">Descripción</label>
                <textarea name="product_description" class="form-control" formControlName="product_description"
                    placeholder="Descripción"
                    [ngClass]="{ 'is-invalid error': _submitted && controls.product_description.errors }">
                </textarea>
                <div *ngIf="_submitted && controls.product_description.errors" class="invalid-feedback">
                    <div *ngIf="controls.product_description.required">
                        Descripción es requerida
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-12 col-lg-6 col-xl-6 form-group">
                <label for="material_description">Descripción del material</label>
                <textarea name="material_description" class="form-control" formControlName="material_description"
                    placeholder="Descripción del material"
                    [ngClass]="{ 'is-invalid error': _submitted && controls.material_description.errors }">
                </textarea>
                <div *ngIf="_submitted && controls.material_description.errors" class="invalid-feedback">
                    <div *ngIf="controls.material_description.required">
                        Descripción del material es requerida
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-12 col-lg-6 col-xl-6 form-group">
                <label for="product_category">Categoría</label>
                <ng-select placeholder="Categoría" id="product_category" class="form-control-select" formControlName="product_category"
                    [ngClass]="{ 'is-invalid error': _submitted && controls.product_category.errors }"
                    (change)="onChangeCategory($event)">
                    <ng-option *ngFor="let item of _categories" [value]="item.id">
                        {{item.name}}
                    </ng-option>
                </ng-select>
                <div *ngIf="_submitted && controls.product_category.errors" class="invalid-feedback">
                    <div *ngIf="controls.product_category.errors.required">
                        Categoría es requerida
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-12 col-lg-6 col-xl-6 form-group">
                <label for="brand">Marca</label>
                <ng-select placeholder="Marca" placeholder="Marca" id="brand" class="form-control-select" formControlName="brand"
                    [ngClass]="{ 'is-invalid error': _submitted && controls.brand.errors }"
                    (change)="onChangeBrand($event)">
                    <ng-option *ngFor="let item of _brands" [value]="item.id">
                        {{item.name}}
                    </ng-option>
                </ng-select>
                <div *ngIf="_submitted && controls.brand.errors" class="invalid-feedback">
                    <div *ngIf="controls.brand.errors.required">
                        Marca es requerida
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <h6 class="mb-1 font-medium-5 border-bottom text-primary">Imagen</h6>
            </div>
            <!-- header media -->
            <div class="media ml-1">
                <div *ngIf="imageComplete != ''; else defaultImage">
                    <img class="rounded mr-50" src="{{ imageComplete }}" height="76" width="80" alt="Imagen" />
                </div>
                <ng-template #defaultImage>
                    <img class="rounded mr-50" src="assets/images/icons/system/configuration/icon_product.png"
                        height="76" width="80" alt="Imagen" />
                </ng-template>
                <!-- upload and reset button -->
                <div class="media-body mt-75 ml-1">
                    <button type="button" for="file-upload-button" class="btn btn-sm btn-primary mb-75 mr-75"
                        (click)="activatingFile(fileInput)" rippleEffect>
                        Subir
                    </button>

                    <input #fileInput type="file" name="file-upload" id="file-upload" accept="image/*" hidden
                        (change)="onSaveFile($event)" />

                    <button type="button" class="btn btn-sm btn-outline-secondary mb-75" (click)="onResetFile()"
                        rippleEffect>
                        Reiniciar
                    </button>
                    <p>JPEG, JPG y PNG permitido. Tamaño máximo de 1 MB.</p>
                </div>
                <!--/ upload and reset button -->
            </div>
            <!--/ header media -->

            <!-- PROGRESS -->
            <div class="progress-c">
                <ng-container *ngIf="_progress > 0">
                    <div class="progress-container">
                        <div class="progress progress-t0">
                            <div class="progress-bar" role="progressbar" [style.width]="_progress+'%'"
                                attr.aria-valuenow="{{_progress}}" aria-valuemin="0" aria-valuemax="100">
                            </div>
                        </div>
                    </div>
                </ng-container>
            </div>
            <!-- / PROGRESS -->
        </div>

    </div>
    <div class="modal-footer">
        <button type="submit" class="btn btn-success" rippleEffect>Guardar</button>
        <button type="button" class="btn btn-secondary" (click)="onClose()" rippleEffect> Cancelar</button>
    </div>
</form>
