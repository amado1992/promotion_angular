<div class="d-flex justify-content-between align-items-center border-bottom">
    <h6 class="mb-1 font-medium-5 text-primary products">Productos</h6>
    <div class="d-flex align-items-center">
        <button type="button" class="btn btn-primary ml-1" rippleEffect (click)="onModalNewProductOpen()">
            <i data-feather="plus" class="d-sm-none d-inline-block mr-0 mr-sm-1"></i>
            <span class="d-none d-sm-inline-block">Nuevo Producto</span>
        </button>
    </div>
</div>

<div class="invoice-edit">
    <div class="card invoice-preview-card">
        <div class="card-body invoice-padding invoice-product-details">
            <form class="source-item">
                <div data-repeater-list="group-a">
                    <div class="repeater-wrapper" data-repeater-item
                        *ngFor="let item of productsComplete; let i = index; trackBy: trackItem" @heightIn>
                        <div class="row">
                            <div class="col-12 d-flex product-details-border position-relative pr-0">
                                <div class="row w-100 pr-lg-0 pr-1 py-2">
                                    <div class="media" style="margin-top: -15px; margin-left: 15px;">
                                        <div>
                                            <div
                                                *ngIf="item.url_complete != undefined && item.url_complete.length > 0; else defaultImage">
                                                <img class="rounded mr-50" src="{{ item.url_complete }}" height="76"
                                                    width="80" alt="Imagen" />
                                            </div>
                                            <ng-template #defaultImage>
                                                <img class="rounded mr-50"
                                                    src="assets/images/icons/system/configuration/icon_product.png"
                                                    height="76" width="80" alt="Imagen" />
                                            </ng-template>
                                        </div>
                                    </div>

                                    <div class="col-12 col-md-4 col-lg-4 col-xl-4 mb-lg-0 mt-lg-0">
                                        <label for="inventories_id">Producto</label>
                                        <ng-select id="inventories_id{{ i }}" class="form-control-select"
                                            placeholder="Buscar" name="inventories_id{{ i }}"
                                            [(ngModel)]="item.inventories_id" notFoundText="No se encontró."
                                            [loading]="_loadingProduct" (change)="onChangeSelectedProduct($event, i)"
                                            (search)="getAllProductsBySearch($event)" [readonly]="false">
                                            <ng-option *ngFor="let item of _products" [value]="item.inventories_id">
                                                {{item.folio}} - {{item.name}}
                                                <span *ngIf="item.stock == 0"
                                                    style="margin-left: 8px; font-style: italic;">
                                                    (Agotado)
                                                </span>
                                            </ng-option>
                                        </ng-select>

                                        <small *ngIf="stock(i) > 0 && stock(i) != 5"
                                            style="font-weight: bold; color: #34ca77;">
                                            Cantidad disponible: {{ stock(i) }}
                                        </small>

                                        <small class="text-danger" *ngIf="stock(i) == 0" style="font-weight: bold;">
                                            Cantidad disponible: {{ stock(i) }}
                                        </small>

                                        <small class="text-danger" *ngIf="stock(i) == 5" style="font-weight: bold;">
                                            Solo quedan {{ stock(i) }} productos, es necesario adicionar más al
                                            inventario.
                                        </small>
                                    </div>

                                    <div class="col-12 col-md-2 col-lg-2 col-xl-2 my-lg-0">
                                        <label for="price"> Precio </label>
                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text">$</span>
                                            </div>
                                            <input [attr.min]="0" type="number" class="form-control" id="price{{ i }}"
                                                name="price{{ i }}" (blur)="onBlur('price', $event, i)"
                                                (change)="onChange('price', $event, i)" [(ngModel)]="item.price" />
                                        </div>
                                    </div>

                                    <div class="col-12 col-md-2 col-lg-2 col-xl-2 my-lg-0">
                                        <label for="amount"> Cantidad ({{item.unit_symbol}})</label>
                                        <input [attr.min]="0" type="number" class="form-control" id="amount{{ i }}"
                                            name="amount{{ i }}" (blur)="onBlur('amount', $event, i)"
                                            (change)="onChange('amount', $event, i)" [(ngModel)]="item.amount" />

                                        <small class="text-danger"
                                            *ngIf="(item.amount > amountMax(i)) && (amountMax(i) > -1)">
                                            {{amountMax(i)}} es la máxima cantidad a adicionar.
                                        </small>
                                    </div>

                                    <div class="col-12 col-md-2 col-lg-2 col-xl-2 my-lg-0">
                                        <label for="total">Total</label>
                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text">$</span>
                                            </div>
                                            <input disabled="true" [attr.min]="0" type="number" class="form-control"
                                                id="total{{ i }}" name="total{{ i }}"
                                                (blur)="onBlur('total', $event, i)"
                                                (change)="onChange('total', $event, i)" [(ngModel)]="item.total" />
                                        </div>
                                    </div>

                                    <div class="col-12 col-md-6 col-lg-4 col-xl-4 my-lg-0 pt-1">
                                        <label>Descripción</label>
                                        <input type="text" class="form-control" id="description{{ i }}"
                                            name="description{{ i }}" [(ngModel)]="item.description"
                                            placeholder="Descripción" disabled="true" />
                                    </div>

                                    <div class="col-12 col-md-6 col-lg-4 col-xl-4 my-lg-0 pt-1">
                                        <label>Descripción del material</label>
                                        <input type="text" class="form-control" id="material_description{{ i }}"
                                            name="material_description{{ i }}" [(ngModel)]="item.material_description"
                                            placeholder="Descripción del material" disabled="true" />
                                    </div>
                                </div>
                                <div
                                    class="d-flex flex-column align-items-center justify-content-between border-left invoice-product-actions py-50 px-25">
                                    <button class="btn p-0 text-danger" (click)="deleteItem(i)">
                                        <span [data-feather]="'x'" [size]="18" [class]="'mr-50'"></span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row d-flex justify-content-center mt-1">
                    <button type="button" class="btn btn-primary" (click)="onAddItem()" rippleEffect>
                        Adicionar Producto
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
